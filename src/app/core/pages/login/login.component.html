<!-- {{ loginForm.get("name")?.errors | json }} -->
<!-- apiErorr -->

<form
  [formGroup]="loginForm"
  (ngSubmit)="login()"
  class="max-w-md mx-auto mt-10"
>
  @if (apiErorr) {
    <div
      class="flex p-4 mb-4 mt-3 text-sm text-red-500 text-fg-warning rounded-base bg-red-50"
      role="alert"
    >
      {{ apiErorr }}
    </div>
  }

  <div class="relative z-0 w-full mb-5 group">
    @let emailControl = loginForm.get("email");

    <app-custom-input
      formControlName="email"
      [type]="'email'"
      [placeholder]="'Add Ur Email'"
    />
    <!-- <input
      formControlName="email"
      type="email"
      name="floating_email"
order-b-2 border-main appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
      placeholder=" "      id="floating_email"
      class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 b
      required
    /> -->
    <label
      for="floating_email"
      class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto"
      >Email</label
    >

    <app-error-message [nameControl]="emailControl"></app-error-message>
  </div>
  <div class="relative z-0 w-full mb-5 group">
    @let passwordControl = loginForm.get("password");

    <app-custom-input
      formControlName="password"
      [type]="!toggleInput ? 'password' : 'text'"
      [placeholder]="'Add Ur Password'"
    />

    <!-- <input
      formControlName="password"
      [type]="!toggleInput ? 'password' : 'text'"
      name="floating_password"
      id="floating_password"
      class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-main appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
      placeholder=" "
      required
    /> -->
    <label
      for="floating_password"
      class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto"
      >Password</label
    >
    <span
      (click)="togglePassword()"
      class="absolute top-0 right-0 cursor-pointer"
    >
      @if (!toggleInput) {
        <i class="fa-solid fa-eye-slash"></i>
      } @else {
        <i class="fa fa-eye"></i>
      }
    </span>
    <app-error-message [nameControl]="passwordControl"></app-error-message>
  </div>

  <button
    [disabled]="isCallingAPI"
    type="submit"
    class="text-white bg-main box-border border border-transparent hover:bg-green-700 focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-md text-sm px-4 py-2.5 focus:outline-none"
  >
    @if (isCallingAPI) {
      <i class="fa fa-spin fa-spinner"></i>
    } @else {
      Login
    }
  </button>
</form>
