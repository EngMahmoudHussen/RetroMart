<form [formGroup]="checOutForm" (ngSubmit)="completeOrder()">
  <div class="relative z-0 w-full mb-5 group">
    @let detailsControl = checOutForm.get("details");

    <input
      formControlName="details"
      type="text"
      name="details"
      id="floating_details"
      placeholder=" "
      class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-main appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
      required
    />

    <label
      for="floating_details"
      class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
    >
      Details
    </label>

    <app-error-message [nameControl]="detailsControl"></app-error-message>
  </div>

  <div class="relative z-0 w-full mb-5 group">
    @let phoneControl = checOutForm.get("phone");

    <input
      formControlName="phone"
      type="text"
      name="phone"
      id="floating_phone"
      placeholder=" "
      class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-main appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
      required
    />

    <label
      for="floating_phone"
      class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
    >
      Phone
    </label>

    <app-error-message [nameControl]="phoneControl"></app-error-message>
  </div>
  <div class="relative z-0 w-full mb-5 group">
    @let cityControl = checOutForm.get("city");

    <input
      formControlName="city"
      type="text"
      name="city"
      id="floating_city"
      placeholder=" "
      class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-main appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
      required
    />

    <label
      for="floating_city"
      class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
    >
      city
    </label>

    <app-error-message [nameControl]="cityControl"></app-error-message>
  </div>
  <button type="submit" class="bg-main rounded-md text-white p-3">Cash</button>
</form>
